<style>
  body {
    margin: 0;
    padding: 16px;
    font-family: Arial, sans-serif;
    background: #f7f8fa;
    color: #1f2937;
  }

  .wrap {
    max-width: 980px;
    margin: 0 auto;
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 20px;
  }

  .title {
    margin: 0 0 6px;
    font-size: 24px;
  }

  .subtitle {
    margin: 0;
    color: #4b5563;
  }

  .header {
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid #e5e7eb;
  }

  .status {
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid #d1d5db;
    background: #f9fafb;
    margin-bottom: 12px;
  }

  .status.error {
    color: #991b1b;
    background: #fef2f2;
    border-color: #fecaca;
  }

  .status.empty {
    display: flex;
    flex-direction: column;
    gap: 4px;
    color: #374151;
  }

  .status.empty strong {
    color: #111827;
  }

  .listMeta {
    margin: 0 0 10px;
    color: #4b5563;
    font-size: 13px;
  }

  .tableWrap {
    overflow-x: auto;
  }

  .tbl {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }

  .tbl th,
  .tbl td {
    border: 1px solid #e5e7eb;
    padding: 10px 8px;
    text-align: left;
    font-size: 14px;
    word-break: break-word;
    vertical-align: middle;
  }

  .tbl th {
    background: #f3f4f6;
    color: #111827;
    font-weight: 600;
    white-space: nowrap;
  }

  .tbl tbody tr:nth-child(even) {
    background: #fafafa;
  }

  .statusBadge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid transparent;
    white-space: nowrap;
  }

  .statusBadge--aprovado,
  .statusBadge--confirmado,
  .statusBadge--ativo {
    color: #065f46;
    background: #d1fae5;
    border-color: #a7f3d0;
  }

  .statusBadge--pendente,
  .statusBadge--aguardando {
    color: #92400e;
    background: #fef3c7;
    border-color: #fde68a;
  }

  .statusBadge--cancelado,
  .statusBadge--rejeitado,
  .statusBadge--inativo {
    color: #991b1b;
    background: #fee2e2;
    border-color: #fecaca;
  }

  .statusBadge--default {
    color: #374151;
    background: #f3f4f6;
    border-color: #d1d5db;
  }

  @media (max-width: 640px) {
    body {
      padding: 12px;
    }

    .wrap {
      padding: 14px;
      border-radius: 10px;
    }

    .title {
      font-size: 22px;
    }

    .tbl th,
    .tbl td {
      font-size: 13px;
      padding: 8px;
    }
  }
</style>
