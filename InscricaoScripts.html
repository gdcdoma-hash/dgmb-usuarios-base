<script>
  (function () {
    var DEFAULT_PAGE_LIMIT = 50;
    var state = {
      page: 1,
      limit: DEFAULT_PAGE_LIMIT,
      totalPages: 1,
      total: 0,
      items: [],
      isLoading: false
    };
    var requestSeq = 0;
    var latestRequestSeq = 0;

    var els = {
      loadingBox: document.getElementById('loadingBox'),
      errorBox: document.getElementById('errorBox'),
      emptyBox: document.getElementById('emptyBox'),
      tableWrap: document.getElementById('tableWrap'),
      totalBadge: document.getElementById('totalBadge'),
      listMeta: document.getElementById('listMeta'),
      tbody: document.getElementById('tbody'),
      prevPageBtn: document.getElementById('prevPageBtn'),
      nextPageBtn: document.getElementById('nextPageBtn'),
      pageInfo: document.getElementById('pageInfo'),
      limitSelect: document.getElementById('limitSelect') || document.querySelector('select[name="limit"]')
    };

    function parsePositiveInt(value, fallback) {
      var parsed = parseInt(value, 10);
      return (isFinite(parsed) && parsed > 0) ? parsed : fallback;
    }

    function hideTable() {
      if (els.tableWrap) els.tableWrap.style.display = 'none';
      if (els.tbody) els.tbody.innerHTML = '';
      if (els.listMeta) els.listMeta.textContent = '';
      if (els.totalBadge) els.totalBadge.textContent = '';
      if (els.pageInfo) els.pageInfo.textContent = '';
      if (els.prevPageBtn) els.prevPageBtn.disabled = true;
      if (els.nextPageBtn) els.nextPageBtn.disabled = true;
    }

    function setStatusVisibility(showLoading, showErrorState, showEmptyState, showList) {
      if (els.loadingBox) els.loadingBox.style.display = showLoading ? 'block' : 'none';
      if (els.errorBox) els.errorBox.style.display = showErrorState ? 'block' : 'none';
      if (els.emptyBox) els.emptyBox.style.display = showEmptyState ? 'block' : 'none';
      if (els.tableWrap) els.tableWrap.style.display = showList ? 'block' : 'none';
    }

    function setLoading(on) {
      state.isLoading = !!on;
      setStatusVisibility(on, false, false, false);
      updatePaginationUi();
    }

    function showError(message) {
      if (!els.errorBox) return;
      els.errorBox.textContent = message || 'Erro ao carregar inscrições.';
      setStatusVisibility(false, true, false, false);
      hideTable();
    }

    function showEmpty() {
      setStatusVisibility(false, false, true, false);
      hideTable();
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function toDisplayValue(value) {
      var normalized = String(value === null || value === undefined ? '' : value).trim();
      return normalized || '—';
    }

    function normalizeStatus(status) {
      return String(status || '').trim().toLowerCase();
    }

    function formatStatus(status) {
      var normalized = normalizeStatus(status);
      if (!normalized) return 'Não informado';

      var labels = {
        aprovado: 'Aprovado',
        confirmado: 'Confirmado',
        ativo: 'Ativo',
        pendente: 'Pendente',
        aguardando: 'Aguardando',
        cancelado: 'Cancelado',
        rejeitado: 'Rejeitado',
        inativo: 'Inativo'
      };

      return labels[normalized] || (normalized.charAt(0).toUpperCase() + normalized.slice(1));
    }

    function getStatusClass(status) {
      var normalized = normalizeStatus(status);
      if (normalized === 'aprovado' || normalized === 'confirmado' || normalized === 'ativo') {
        return 'statusBadge statusBadge--aprovado';
      }
      if (normalized === 'pendente' || normalized === 'aguardando') {
        return 'statusBadge statusBadge--pendente';
      }
      if (normalized === 'cancelado' || normalized === 'rejeitado' || normalized === 'inativo') {
        return 'statusBadge statusBadge--cancelado';
      }
      return 'statusBadge statusBadge--default';
    }

    function parseDateSafe(raw) {
      if (raw === null || raw === undefined || raw === '') return null;

      var value = String(raw).trim();
      if (!value) return null;

      var direct = new Date(value);
      if (!isNaN(direct.getTime())) return direct;

      var parts = value.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})(?:\s+(\d{1,2}):(\d{2})(?::(\d{2}))?)?$/);
      if (!parts) return null;

      var day = Number(parts[1]);
      var month = Number(parts[2]) - 1;
      var year = Number(parts[3]);
      var hour = Number(parts[4] || 0);
      var minute = Number(parts[5] || 0);
      var second = Number(parts[6] || 0);

      var parsed = new Date(year, month, day, hour, minute, second);
      return isNaN(parsed.getTime()) ? null : parsed;
    }

    function formatDateTime(raw) {
      if (raw === null || raw === undefined || raw === '') {
        return 'Não informada';
      }

      var date = parseDateSafe(raw);
      if (!date) {
        return String(raw);
      }

      try {
        return new Intl.DateTimeFormat('pt-BR', {
          day: '2-digit',
          month: '2-digit',
          year: 'numeric',
          hour: '2-digit',
          minute: '2-digit'
        }).format(date);
      } catch (e) {
        return date.toLocaleString();
      }
    }

    function updatePaginationUi() {
      var page = Number(state.page) || 1;
      var totalPages = Number(state.totalPages) || 1;

      if (els.listMeta) {
        var total = Number(state.total) || 0;
        var start = total > 0 ? ((page - 1) * state.limit) + 1 : 0;
        var end = total > 0 ? Math.min(page * state.limit, total) : 0;
        els.listMeta.innerHTML =
          '<span class="listMetaLine">Exibindo ' + start + '–' + end + ' de ' + total + ' registros</span>' +
          '<span class="listMetaLine">Página ' + page + ' de ' + totalPages + '</span>';
      }

      if (els.pageInfo) {
        els.pageInfo.textContent = 'Página ' + page + ' de ' + totalPages;
      }

      if (els.prevPageBtn) {
        els.prevPageBtn.disabled = state.isLoading || page <= 1;
      }

      if (els.nextPageBtn) {
        els.nextPageBtn.disabled = state.isLoading || page >= totalPages;
      }

      if (els.limitSelect) {
        els.limitSelect.disabled = state.isLoading;
      }
    }

    function renderRows(items, total) {
      if (!els.tbody) return;

      var html = '';
      for (var i = 0; i < items.length; i++) {
        var item = items[i] || {};
        var statusText = formatStatus(item.status);
        var statusClass = getStatusClass(item.status);

        html += '<tr>' +
          '<td class="colInscricao">' + escapeHtml(toDisplayValue(item.id_inscricao)) + '</td>' +
          '<td class="colUsuario">' + escapeHtml(toDisplayValue(item.id_usuario)) + '</td>' +
          '<td class="colEvento">' + escapeHtml(toDisplayValue(item.id_evento)) + '</td>' +
          '<td class="colStatus"><span class="' + statusClass + '">' + escapeHtml(statusText) + '</span></td>' +
          '<td class="colData">' + escapeHtml(formatDateTime(item.data_inscricao)) + '</td>' +
          '</tr>';
      }

      els.tbody.innerHTML = html;

      if (els.totalBadge) {
        els.totalBadge.textContent = 'Total de inscrições: ' + total;
      }

      updatePaginationUi();
      setStatusVisibility(false, false, false, true);
    }

    function carregarInscricoes(params) {
      if (state.isLoading) return;

      var config = params || {};
      var targetLimit = parsePositiveInt(config.limit, state.limit || DEFAULT_PAGE_LIMIT);
      var targetPage = Number(config.page) || state.page || 1;
      var currentRequestSeq = ++requestSeq;
      latestRequestSeq = currentRequestSeq;

      if (config.resetPage || targetLimit !== state.limit) {
        targetPage = 1;
      }

      if (targetPage < 1) targetPage = 1;

      setLoading(true);
      hideTable();

      google.script.run
        .withSuccessHandler(function (resp) {
          if (currentRequestSeq !== latestRequestSeq) return;

          state.isLoading = false;
          updatePaginationUi();

          if (!resp || !resp.ok || !resp.data) {
            var msg = (resp && resp.error && resp.error.message)
              ? resp.error.message
              : 'Falha ao obter inscrições.';
            showError(msg);
            return;
          }

          var data = resp.data || {};
          var items = Array.isArray(data.items) ? data.items : [];
          var total = Number(data.total) || 0;
          var backendLimit = parsePositiveInt(data.limit, targetLimit);
          var totalPages = Number(data.totalPages) || Math.max(1, Math.ceil(total / backendLimit));
          var currentPage = Number(data.page) || targetPage;

          state.page = currentPage;
          state.limit = backendLimit;
          state.totalPages = totalPages;
          state.total = total;
          state.items = items;

          if (els.limitSelect) {
            els.limitSelect.value = String(state.limit);
          }

          if (!items.length) {
            showEmpty();
            return;
          }

          renderRows(items, total);
        })
        .withFailureHandler(function (err) {
          if (currentRequestSeq !== latestRequestSeq) return;

          state.isLoading = false;
          updatePaginationUi();
          showError((err && err.message) ? err.message : 'Erro inesperado na comunicação com o servidor.');
        })
        .apiInscricoesListarResumo({ page: targetPage, limit: targetLimit });
    }

    if (els.prevPageBtn) {
      els.prevPageBtn.addEventListener('click', function () {
        if (state.page <= 1) return;
        carregarInscricoes({ page: state.page - 1 });
      });
    }

    if (els.nextPageBtn) {
      els.nextPageBtn.addEventListener('click', function () {
        if (state.page >= state.totalPages) return;
        carregarInscricoes({ page: state.page + 1 });
      });
    }

    if (els.limitSelect) {
      els.limitSelect.addEventListener('change', function () {
        var selectedLimit = parsePositiveInt(els.limitSelect.value, state.limit || DEFAULT_PAGE_LIMIT);
        carregarInscricoes({ limit: selectedLimit, resetPage: true });
      });
    }

    carregarInscricoes({ page: 1 });
  })();
</script>
